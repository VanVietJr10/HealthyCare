<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lịch ngay</title>
    <link rel="stylesheet" href="../assets/style.css" />
    <link rel="stylesheet" href="./book.css" />
    <link rel="icon" type="image_book/png" href="../img/image_book.png" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Bỏ qua để đến nội dung chính</a>
    <header class="header">
      <div class="container header-all">
        <div class="header-left">
          <a href="../index.html" class="logo-link">
            <img src="../img/logo.png" alt="HealthyCare Logo" />
            <p>HealthyCare</p>
          </a>
        </div>

        <nav class="header-right" aria-label="Thanh điều hướng chính">
          <ul class="header-right-menu">
            <li><a href="../index.html">Trang chủ</a></li>
            <li><a href="../layout/doctors.html">Bác sĩ</a></li>
            <li><a href="book.html" class="btn-dat-lich">Đặt lịch</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="booking-section">
        <h1 class="booking-title">Đặt Lịch Hẹn Khám Bệnh</h1>
        <p class="booking-subtitle">
          Vui lòng điền đầy đủ thông tin để chúng tôi sắp xếp lịch khám tốt nhất
          cho bạn.
        </p>

        <form
          class="booking-form"
          id="main-booking-form"
          action="#"
          method="POST"
        >
          <div class="form-group">
            <label for="fullname">Họ và tên bệnh nhân:</label>
            <input
              type="text"
              id="fullname"
              name="fullname"
              placeholder="Ví dụ: Nguyễn Văn A"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Số điện thoại liên hệ:</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Ví dụ: 0912345678"
              required
            />
          </div>

          <div class="form-group">
            <label for="select-khoa">Chọn chuyên khoa khám:</label>
            <select id="select-khoa" name="khoa" required>
              <option value="">-- Chọn chuyên khoa --</option>
              <option value="noi-tong-quat">Chuyên khoa Nội Tổng Quát</option>
              <option value="san-phu-khoa">Chuyên khoa Sản Phụ Khoa</option>
              <option value="tai-mui-hong">Chuyên khoa Tai Mũi Họng</option>
              <option value="rang-ham-mat">Chuyên khoa Răng Hàm Mặt</option>
              <option value="mat">Chuyên khoa Mắt</option>
              <option value="da-lieu">Chuyên khoa Da Liễu</option>
              <option value="tim-mach">Chuyên khoa Tim Mạch</option>
              <option value="co-xuong-khop">Chuyên khoa Cơ Xương Khớp</option>
              <option value="than-kinh">Chuyên khoa Thần Kinh</option>
              <option value="nhi">Chuyên khoa Nhi</option>
            </select>
          </div>

          <div class="form-group">
            <label for="select-doctor">Chọn bác sĩ phụ trách:</label>
            <select id="select-doctor" name="doctor" required>
              <option value="">-- Vui lòng chọn chuyên khoa trước --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="date">Ngày muốn đến khám:</label>
            <input type="date" id="date" name="date" required />
          </div>

          <div class="form-group">
            <label for="note">Triệu chứng hoặc ghi chú thêm (nếu có):</label>
            <textarea
              id="note"
              name="note"
              rows="4"
              placeholder="Nhập các triệu chứng bạn đang gặp phải hoặc yêu cầu đặc biệt..."
            ></textarea>
          </div>
          <div
            id="booking-status"
            class="status-message"
            aria-live="polite"
            style="display: none"
          ></div>
          <button type="submit" class="btn-submit-booking">
            Xác nhận đặt lịch ngay
          </button>
        </form>
      </section>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
